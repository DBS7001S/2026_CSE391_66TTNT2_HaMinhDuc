<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="registration-container">
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Họ và Tên</label><br>
                <input type="text" id="name">
                <span class="error-message" id="error-name"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label><br>
                <input type="email" id="email">
                <span class="error-message" id="error-email"></span>
            </div>

            <div class="form-group">
                <label for="tel">Số Điện Thoại</label><br>
                <input type="tel" id="tel">
                <span class="error-message" id="error-tel"></span>
            </div>

            <div class="form-group">
                <label for="passwd">Mật Khẩu</label><br>
                <input type="password" id="passwd">
                <span class="error-message" id="error-passwd"></span>
            </div>

            <div class="form-group">
                <label for="repasswd">Xác Nhận Mật Khẩu</label><br>
                <input type="password" id="repasswd">
                <span class="error-message" id="error-repasswd"></span>
            </div>

            <div class="form-group">
                <label>Giới Tính</label><br>
                <input type="radio" name="gender" id="male" value="Nam"> <label for="male">Nam</label>
                <input type="radio" name="gender" id="female" value="Nữ"> <label for="female">Nữ</label>
                <span class="error-message" id="error-gender"></span>
            </div>

            <div class="form-group">
                <input type="checkbox" id="rules">
                <label for="rules">Tôi đã chấp nhận tất cả các điều khoản.</label>
                <span class="error-message" id="error-rules"></span>
            </div>

            <button type="submit" id="btnSubmit">Đăng ký</button>
        </form>
    </div>

    <div id="success-msg"></div>

    <script src="scripts.js"></script>
</body>
</html>
